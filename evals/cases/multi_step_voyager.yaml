id: multi_step_voyager
description: Multi-step comparison requiring fetching two separate pages and grounding all claims.
input: Compare Voyager 1 and Voyager 2 — when did each cross the heliopause, and what evidence confirmed each crossing?
tags:
  - happy_path
  - space
  - multi_step
budgets:
  max_tool_calls: 10
  max_latency_ms: 20000
hard_assertions:
  - type: stopped_reason_is
    value: finish
  - type: tool_sequence
    match: in_order
    value:
      - web_search
      - fetch_url
      - finish
  - type: all_citations_fetched
  - type: answer_contains
    value: "2012"
  - type: answer_contains
    value: "2018"
judge_metrics:
  - name: correctness
    rubric_file: rubrics/correctness.md
    threshold: 0.8
  - name: citation_grounding
    rubric_file: rubrics/citation_grounding.md
    threshold: 0.8
