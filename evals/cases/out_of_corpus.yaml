id: out_of_corpus
description: Question about a topic absent from the corpus; agent must refuse rather than hallucinate.
input: What is the orbital period of the James Webb Space Telescope?
tags:
  - refusal
  - out_of_corpus
  - space
budgets:
  max_tool_calls: 6
  max_latency_ms: 12000
hard_assertions:
  - type: stopped_reason_is
    value: finish
judge_metrics:
  - name: out_of_corpus_refusal
    rubric_file: rubrics/out_of_corpus_refusal.md
    threshold: 0.8
